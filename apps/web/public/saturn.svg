      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.95" />
    </radialGradient>
    <linearGradient id="ringInner" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.0" />
      <stop offset="20%" stop-color="#fcd34d" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.85" />
      <stop offset="80%" stop-color="#fcd34d" stop-opacity="0.7" />
