# Production: full Canto stack (builds from local Dockerfile).
# Infra (VPN, qBittorrent, Jellyfin, Prowlarr) lives in a separate stack.
# Required env: POSTGRES_PASSWORD, REDIS_PASSWORD, BETTER_AUTH_SECRET, BETTER_AUTH_URL, MEDIA_PATH.
# The migrate service builds canto:latest; canto and worker consume the built image.
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-canto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-canto}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-canto}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: canto:latest
    pull_policy: build
    command: pnpm --filter @canto/db exec drizzle-kit push --force
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-canto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-canto}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  canto:
    image: canto:latest
    pull_policy: never
    command: node apps/web/server.js
    working_dir: /app
    ports:
      - "${CANTO_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-canto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-canto}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID:-}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET:-}
    volumes:
      - ${MEDIA_PATH}:/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: canto:latest
    pull_policy: never
    command: pnpm --filter @canto/worker exec tsx src/index.ts
    working_dir: /app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-canto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-canto}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${MEDIA_PATH}:/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
