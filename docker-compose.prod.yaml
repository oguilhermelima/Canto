# Production: all services containerized.
# Usage: docker compose -f docker-compose.prod.yaml up -d
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: canto
      POSTGRES_PASSWORD: canto
      POSTGRES_DB: canto
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: pnpm --filter @canto/db push
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://canto:canto@postgres:5432/canto
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node apps/web/.next/standalone/apps/web/server.js
    working_dir: /app
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://canto:canto@postgres:5432/canto
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node apps/worker/dist/index.js
    working_dir: /app
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://canto:canto@postgres:5432/canto
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
      WEBUI_PORT: 8080
    volumes:
      - qbittorrent_config:/config
      - ./data/downloads:/downloads

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
    volumes:
      - prowlarr_config:/config

volumes:
  postgres_data:
  redis_data:
  qbittorrent_config:
  prowlarr_config:
