# Development: infrastructure only. App runs locally via `pnpm dev`.
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: canto
      POSTGRES_PASSWORD: canto
      POSTGRES_DB: canto
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
      WEBUI_PORT: 8080
    volumes:
      - qbittorrent_config:/config
      - ./data/downloads:/downloads

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
    volumes:
      - prowlarr_config:/config

volumes:
  postgres_data:
  redis_data:
  qbittorrent_config:
  prowlarr_config:
