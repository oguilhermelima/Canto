services:
  postgres:
    image: postgres:18
    container_name: mediamanager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediamanager
      POSTGRES_PASSWORD: mediamanager
      POSTGRES_DB: mediamanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediamanager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
      WEBUI_PORT: 8080
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - qbittorrent_config:/config
      - ./data/downloads:/downloads
      - ./data/media:/media

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
    ports:
      - "9696:9696"
    volumes:
      - prowlarr_config:/config

volumes:
  postgres_data:
  redis_data:
  qbittorrent_config:
  prowlarr_config:
